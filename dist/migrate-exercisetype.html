<!DOCTYPE html>
<html>
<head>
  <title>TheGradual - Exercise Type Migration</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    button {
      background: #171717;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #404040;
    }
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
    }
    .success { color: #10B981; font-weight: bold; }
    .error { color: #EF4444; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Exercise Type Migration Tool</h1>
  <p>This tool adds the <code>exerciseType</code> field to all exercises in your saved sessions.</p>

  <button onclick="analyze()">1. Analyze Data</button>
  <button onclick="migrate()">2. Migrate Data</button>
  <button onclick="clearAll()">3. Clear All Data (DANGER)</button>

  <div id="output"></div>

  <script>
    function analyze() {
      const output = document.getElementById('output');
      output.innerHTML = '<h3>Analysis:</h3>';

      const sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
      const customExercises = JSON.parse(localStorage.getItem('customExercises') || '[]');

      let missingCount = 0;
      let totalExercises = 0;

      sessions.forEach(session => {
        session.exercises?.forEach(ex => {
          totalExercises++;
          if (!ex.exerciseType) {
            missingCount++;
          }
        });
      });

      customExercises.forEach(ex => {
        totalExercises++;
        if (!ex.exerciseType) {
          missingCount++;
        }
      });

      output.innerHTML += `
        <p>Total sessions: ${sessions.length}</p>
        <p>Total exercises checked: ${totalExercises}</p>
        <p>Exercises missing exerciseType: <strong>${missingCount}</strong></p>
        ${missingCount > 0 ? '<p class="error">⚠️ Migration needed</p>' : '<p class="success">✓ All exercises have exerciseType</p>'}
      `;
    }

    function migrate() {
      const output = document.getElementById('output');
      output.innerHTML = '<h3>Migration Results:</h3>';

      try {
        // Migrate sessions
        const sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
        let sessionsMigrated = 0;

        sessions.forEach(session => {
          session.exercises?.forEach(ex => {
            if (!ex.exerciseType) {
              // Default to weight+reps for backward compatibility
              ex.exerciseType = 'weight+reps';
              sessionsMigrated++;
            }
          });
        });

        localStorage.setItem('sessions', JSON.stringify(sessions));

        // Migrate custom exercises
        const customExercises = JSON.parse(localStorage.getItem('customExercises') || '[]');
        let customMigrated = 0;

        customExercises.forEach(ex => {
          if (!ex.exerciseType) {
            ex.exerciseType = 'weight+reps';
            customMigrated++;
          }
        });

        localStorage.setItem('customExercises', JSON.stringify(customExercises));

        output.innerHTML += `
          <p class="success">✓ Migration complete!</p>
          <p>Session exercises migrated: ${sessionsMigrated}</p>
          <p>Custom exercises migrated: ${customMigrated}</p>
          <p><strong>Please reload the app to see changes.</strong></p>
        `;
      } catch (error) {
        output.innerHTML += `<p class="error">Error: ${error.message}</p>`;
      }
    }

    function clearAll() {
      if (!confirm('⚠️ This will DELETE ALL your workout data! Are you sure?')) {
        return;
      }
      if (!confirm('Really? This cannot be undone!')) {
        return;
      }

      localStorage.clear();
      document.getElementById('output').innerHTML = '<p class="success">✓ All data cleared. Reload the app.</p>';
    }
  </script>
</body>
</html>
